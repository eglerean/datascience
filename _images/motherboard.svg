<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 380" width="450" height="380">
  <title>Computer Motherboard</title>
  <desc>Illustration of a computer ATX motherboard</desc>
  <rect width="450" height="380" fill="#ddd"/>
  <!-- PCB -->
  <rect x="10" y="10" width="430" height="360" fill="#2a4a1a" rx="4"/>
  <!-- Traces (simplified) -->
  <line x1="60" y1="60" x2="200" y2="60" stroke="#3a6a2a" stroke-width="2"/>
  <line x1="200" y1="60" x2="200" y2="160" stroke="#3a6a2a" stroke-width="2"/>
  <line x1="60" y1="100" x2="160" y2="100" stroke="#3a6a2a" stroke-width="2"/>
  <!-- CPU socket -->
  <rect x="180" y="40" width="120" height="120" fill="#1a1a1a" rx="3"/>
  <rect x="190" y="50" width="100" height="100" fill="#333" rx="2"/>
  <text x="240" y="103" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">CPU</text>
  <text x="240" y="116" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">Socket</text>
  <!-- RAM slots -->
  <rect x="320" y="40" width="15" height="140" fill="#1a1a1a" rx="1"/>
  <rect x="340" y="40" width="15" height="140" fill="#1a1a1a" rx="1"/>
  <rect x="360" y="40" width="15" height="140" fill="#1a1a1a" rx="1"/>
  <rect x="380" y="40" width="15" height="140" fill="#1a1a1a" rx="1"/>
  <text x="360" y="200" text-anchor="middle" font-family="monospace" font-size="8" fill="#999">RAM</text>
  <!-- PCIe slots -->
  <rect x="30" y="200" width="340" height="12" fill="#111" rx="1"/>
  <rect x="30" y="220" width="200" height="10" fill="#111" rx="1"/>
  <rect x="30" y="238" width="340" height="12" fill="#111" rx="1"/>
  <rect x="30" y="258" width="200" height="10" fill="#111" rx="1"/>
  <text x="20" y="290" font-family="monospace" font-size="8" fill="#999">PCIe</text>
  <!-- Power connectors -->
  <rect x="30" y="40" width="30" height="50" fill="#222" rx="2"/>
  <text x="45" y="70" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">24pin</text>
  <!-- Chipset -->
  <rect x="100" y="160" width="60" height="60" fill="#2c2c2c" rx="2"/>
  <text x="130" y="193" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">PCH</text>
  <!-- I/O panel area -->
  <rect x="10" y="300" width="430" height="70" fill="#1a3010" rx="3"/>
  <rect x="20" y="310" width="50" height="40" fill="#333" rx="1"/>
  <rect x="80" y="310" width="30" height="15" fill="#555" rx="1"/>
  <rect x="80" y="330" width="30" height="15" fill="#555" rx="1"/>
  <rect x="120" y="310" width="30" height="40" fill="#666" rx="1"/>
  <rect x="160" y="310" width="30" height="40" fill="#444" rx="1"/>
  <text x="225" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#999">I/O Panel</text>
</svg>
