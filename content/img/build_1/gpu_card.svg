<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <title>GPU Graphics Card</title>
  <desc>Illustration of a GPU (Graphics Processing Unit) expansion card</desc>
  <rect width="400" height="220" fill="#e0e0e0"/>
  <!-- PCB -->
  <rect x="20" y="40" width="360" height="140" fill="#1a5c1a" rx="4"/>
  <!-- GPU chip -->
  <rect x="180" y="65" width="90" height="90" fill="#2c2c2c" rx="3"/>
  <rect x="190" y="75" width="70" height="70" fill="#111" rx="2"/>
  <text x="225" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#76c442">GPU</text>
  <text x="225" y="125" text-anchor="middle" font-family="monospace" font-size="7" fill="#558830">CUDA</text>
  <!-- Cooler/heatsink fins -->
  <rect x="30" y="55" width="130" height="110" fill="#888" rx="3"/>
  <rect x="35" y="60" width="8" height="100" fill="#aaa"/>
  <rect x="48" y="60" width="8" height="100" fill="#aaa"/>
  <rect x="61" y="60" width="8" height="100" fill="#aaa"/>
  <rect x="74" y="60" width="8" height="100" fill="#aaa"/>
  <rect x="87" y="60" width="8" height="100" fill="#aaa"/>
  <rect x="100" y="60" width="8" height="100" fill="#aaa"/>
  <rect x="113" y="60" width="8" height="100" fill="#aaa"/>
  <rect x="126" y="60" width="8" height="100" fill="#aaa"/>
  <rect x="139" y="60" width="8" height="100" fill="#aaa"/>
  <!-- VRAM chips -->
  <rect x="290" y="70" width="30" height="20" fill="#333" rx="1"/>
  <rect x="330" y="70" width="30" height="20" fill="#333" rx="1"/>
  <rect x="290" y="100" width="30" height="20" fill="#333" rx="1"/>
  <rect x="330" y="100" width="30" height="20" fill="#333" rx="1"/>
  <rect x="290" y="130" width="30" height="20" fill="#333" rx="1"/>
  <rect x="330" y="130" width="30" height="20" fill="#333" rx="1"/>
  <!-- PCIe connector -->
  <rect x="20" y="175" width="360" height="10" fill="#f0d060"/>
  <rect x="20" y="180" width="360" height="5" fill="#c8a830"/>
  <!-- Display outputs -->
  <rect x="300" y="158" width="18" height="14" fill="#222" rx="1"/>
  <rect x="322" y="158" width="18" height="14" fill="#222" rx="1"/>
  <rect x="344" y="158" width="18" height="14" fill="#222" rx="1"/>
  <text x="200" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#444">Graphics Processing Unit (GPU)</text>
</svg>
