<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <title>Server Rack / NAS Storage</title>
  <desc>Illustration of a network-attached storage server rack</desc>
  <rect width="300" height="500" fill="#ccc"/>
  <!-- Rack enclosure -->
  <rect x="30" y="20" width="240" height="460" fill="#444" rx="5"/>
  <rect x="40" y="30" width="220" height="440" fill="#2a2a2a" rx="3"/>
  <!-- 1U Server units -->
  <!-- Unit 1 - Switch -->
  <rect x="45" y="40" width="210" height="25" fill="#1a4a1a" rx="2"/>
  <circle cx="60" cy="52" r="4" fill="#00ff00"/>
  <circle cx="72" cy="52" r="4" fill="#00ff00"/>
  <circle cx="84" cy="52" r="4" fill="#ffaa00"/>
  <text x="220" y="57" text-anchor="end" font-family="monospace" font-size="8" fill="#aaa">48-Port Switch</text>
  <!-- Unit 2 - Server -->
  <rect x="45" y="72" width="210" height="40" fill="#333" rx="2"/>
  <rect x="50" y="77" width="70" height="30" fill="#222" rx="1"/>
  <circle cx="140" cy="92" r="3" fill="#00ff00"/>
  <circle cx="152" cy="92" r="3" fill="#00ff00"/>
  <text x="220" y="96" text-anchor="end" font-family="monospace" font-size="8" fill="#aaa">Head Node</text>
  <!-- Units 3-10 Storage -->
  <rect x="45" y="119" width="210" height="30" fill="#2a2a3a" rx="2"/>
  <rect x="50" y="124" width="140" height="20" fill="#111" rx="1"/>
  <text x="200" y="138" font-family="monospace" font-size="8" fill="#668"/>  
  <text x="220" y="139" text-anchor="end" font-family="monospace" font-size="8" fill="#88a">Storage 1</text>
  <rect x="45" y="156" width="210" height="30" fill="#2a2a3a" rx="2"/>
  <rect x="50" y="161" width="140" height="20" fill="#111" rx="1"/>
  <text x="220" y="176" text-anchor="end" font-family="monospace" font-size="8" fill="#88a">Storage 2</text>
  <rect x="45" y="193" width="210" height="30" fill="#2a2a3a" rx="2"/>
  <rect x="50" y="198" width="140" height="20" fill="#111" rx="1"/>
  <text x="220" y="213" text-anchor="end" font-family="monospace" font-size="8" fill="#88a">Storage 3</text>
  <rect x="45" y="230" width="210" height="30" fill="#2a2a3a" rx="2"/>
  <rect x="50" y="235" width="140" height="20" fill="#111" rx="1"/>
  <text x="220" y="250" text-anchor="end" font-family="monospace" font-size="8" fill="#88a">Storage 4</text>
  <!-- Compute nodes -->
  <rect x="45" y="267" width="210" height="35" fill="#3a2a1a" rx="2"/>
  <rect x="50" y="272" width="55" height="25" fill="#222" rx="1"/>
  <rect x="110" y="272" width="55" height="25" fill="#222" rx="1"/>
  <text x="220" y="289" text-anchor="end" font-family="monospace" font-size="8" fill="#a88">Compute 1</text>
  <rect x="45" y="309" width="210" height="35" fill="#3a2a1a" rx="2"/>
  <rect x="50" y="314" width="55" height="25" fill="#222" rx="1"/>
  <rect x="110" y="314" width="55" height="25" fill="#222" rx="1"/>
  <text x="220" y="331" text-anchor="end" font-family="monospace" font-size="8" fill="#a88">Compute 2</text>
  <!-- PDU/Power -->
  <rect x="45" y="351" width="210" height="20" fill="#4a3a1a" rx="2"/>
  <circle cx="60" cy="361" r="3" fill="#ffaa00"/>
  <text x="220" y="365" text-anchor="end" font-family="monospace" font-size="8" fill="#aa8">PDU</text>
  <!-- UPS -->
  <rect x="45" y="378" width="210" height="50" fill="#1a2a3a" rx="2"/>
  <text x="150" y="408" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#6af">UPS</text>
  <!-- Empty space -->
  <rect x="45" y="435" width="210" height="25" fill="#222" rx="2"/>
  <text x="150" y="452" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">1U Blank Panel</text>
  <text x="150" y="490" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">Network Attached Storage</text>
</svg>
